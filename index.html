<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Outbound Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
body {
  font-family: Arial;
  background: #f4f6f9;
  margin: 0;
  padding: 20px;
}
h1 { margin-bottom: 10px; }

.container { max-width: 1200px; margin: auto; }

.cards {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: 10px;
  margin-bottom: 20px;
}
.card {
  padding: 15px;
  border-radius: 10px;
  color: white;
  text-align: center;
}
.total { background: #3498db; }
.belum { background: #e74c3c; }
.antri { background: #f1c40f; color:black; }
.proses { background: #2980b9; }
.selesai { background: #27ae60; }

.section {
  background: white;
  padding: 15px;
  border-radius: 10px;
  margin-bottom: 20px;
}

table {
  width: 100%;
  border-collapse: collapse;
}
th, td {
  padding: 8px;
  border-bottom: 1px solid #ddd;
  text-align: left;
}

.progress-bar {
  height: 20px;
  background: #ddd;
  border-radius: 10px;
  overflow: hidden;
}
.progress {
  height: 100%;
  background: #27ae60;
}
</style>
</head>

<body>

<div class="container">
<h1>📊 Outbound Dashboard</h1>

<div class="cards">
  <div class="card total">Total<br><h2 id="total">0</h2></div>
  <div class="card belum">Belum Datang<br><h2 id="belum">0</h2></div>
  <div class="card antri">Antri<br><h2 id="antri">0</h2></div>
  <div class="card proses">Proses<br><h2 id="proses">0</h2></div>
  <div class="card selesai">Selesai<br><h2 id="selesai">0</h2></div>
</div>

<div class="section">
  <canvas id="chart"></canvas>
</div>

<div class="section">
  <h3>Summary Shift</h3>
  <table>
    <thead>
      <tr><th>Shift</th><th>Total Case ID</th><th>Total CBM</th></tr>
    </thead>
    <tbody id="shiftTable"></tbody>
  </table>
</div>

<div class="section">
  <h3>Progress Penyelesaian</h3>
  <div class="progress-bar">
    <div id="progress" class="progress"></div>
  </div>
  <p id="progressText"></p>
</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
<script>
const url = "https://docs.google.com/spreadsheets/d/e/2PACX-1vT1YwOyPQa1twBR3ms6LrmdxwMeGJ8K3xLmYsPkoO6g5ngC6F5ZhpJhwNPx8_cNhzbszqcIhAR-vGxf/pub?gid=1300627959&single=true&output=csv";

Papa.parse(url, {
  download: true,
  header: true,
  skipEmptyLines: true,
  complete: function(results) {

    const data = results.data;

    let total = 0, belum = 0, antri = 0, proses = 0, selesai = 0;
    let shiftData = {};

    data.forEach(row => {
      let status = (row["STATUS"] || "").trim().toUpperCase();
      let shift = (row["PENYELESAIAN"] || "").trim().toUpperCase();
      let cbm = parseFloat(row["TOTAL CBM"]) || 0;

      if (!status) return;

      total++;

      if (!shiftData[shift]) {
        shiftData[shift] = { count: 0, cbm: 0 };
      }

      shiftData[shift].count++;
      shiftData[shift].cbm += cbm;

      if (status === "BELUM DATANG") belum++;
      else if (status === "ANTRI") antri++;
      else if (status === "PROSES") proses++;
      else if (status === "SELESAI") selesai++;
    });

    document.getElementById("total").innerText = total;
    document.getElementById("belum").innerText = belum;
    document.getElementById("antri").innerText = antri;
    document.getElementById("proses").innerText = proses;
    document.getElementById("selesai").innerText = selesai;

    new Chart(document.getElementById("chart"), {
      type: "doughnut",
      data: {
        labels: ["Belum", "Antri", "Proses", "Selesai"],
        datasets: [{ data: [belum, antri, proses, selesai] }]
      }
    });

    let html = "";
    for (let s in shiftData) {
      html += `<tr>
        <td>${s}</td>
        <td>${shiftData[s].count}</td>
        <td>${shiftData[s].cbm.toFixed(2)}</td>
      </tr>`;
    }
    document.getElementById("shiftTable").innerHTML = html;

    let percent = total ? (selesai / total) * 100 : 0;
    document.getElementById("progress").style.width = percent + "%";
    document.getElementById("progressText").innerText =
      `${selesai} / ${total} selesai (${percent.toFixed(1)}%)`;

  },
  error: function(err) {
    console.error("ERROR:", err);
    alert("Gagal load data");
  }
});
</script>

</body>
</html>
