<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Outbound WH Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--font:'Plus Jakarta Sans',system-ui,sans-serif;--bg:#f4f6fb;--surface:#fff;--border:#e8ecf4;--text:#1c2234;--text2:#5a6480;--text3:#9aa0b4;--radius:14px}
body{font-family:var(--font);background:var(--bg);display:flex}
.sidebar{width:240px;background:#1a1f36;color:#fff;height:100vh;padding:16px;position:fixed}
.menu-item{padding:10px;border-radius:8px;cursor:pointer;margin-bottom:6px}
.menu-item:hover{background:rgba(255,255,255,.1)}
.menu-item.active{background:#1a56db}
.main{margin-left:240px;flex:1}
.header{background:#fff;padding:16px 24px;border-bottom:1px solid var(--border);font-weight:700}
.content{padding:20px}
.page{display:none}
.page.active{display:block}
.kpi-row{display:grid;grid-template-columns:repeat(5,1fr);gap:12px;margin-bottom:16px}
.kpi{background:#fff;padding:14px;border-radius:10px;border:1px solid var(--border)}
.row{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px}
.card{background:#fff;padding:16px;border-radius:10px;border:1px solid var(--border)}
.chart{height:260px}
</style>
</head>
<body>

<div class="sidebar">
  <div class="menu-item active" onclick="showPage('monitoring')">📦 Monitoring</div>
  <div class="menu-item" onclick="showPage('produktivitas')">📊 Produktivitas</div>
  <div class="menu-item" onclick="showPage('temuan')">🚨 Temuan</div>
</div>

<div class="main">
  <div class="header">Outbound Dashboard</div>
  <div class="content">

    <div id="page-monitoring" class="page active">
      <h3>Monitoring Loading (placeholder)</h3>
    </div>

    <div id="page-produktivitas" class="page">
      <h3>Produktivitas MPP (placeholder)</h3>
    </div>

    <div id="page-temuan" class="page">
      <div class="kpi-row" id="kpi"></div>

      <div class="row">
        <div class="card"><canvas id="donut" class="chart"></canvas></div>
        <div class="card"><canvas id="trend" class="chart"></canvas></div>
      </div>

      <div class="row">
        <div class="card"><canvas id="picker" class="chart"></canvas></div>
        <div class="card"><canvas id="checker" class="chart"></canvas></div>
      </div>

      <div class="row">
        <div class="card"><canvas id="sku" class="chart"></canvas></div>
        <div class="card"><canvas id="area" class="chart"></canvas></div>
      </div>
    </div>

  </div>
</div>

<script>
function showPage(p){
  document.querySelectorAll('.page').forEach(x=>x.classList.remove('active'));
  document.getElementById('page-'+p).classList.add('active');
  document.querySelectorAll('.menu-item').forEach(x=>x.classList.remove('active'));
  event.target.classList.add('active');
}

const URL='https://docs.google.com/spreadsheets/d/e/2PACX-1vT1YwOyPQa1twBR3ms6LrmdxwMeGJ8K3xLmYsPkoO6g5ngC6F5ZhpJhwNPx8_cNhzbszqcIhAR-vGxf/pub?gid=873262577&single=true&output=csv';
let data=[],charts={};

function groupBy(arr,key){return arr.reduce((a,x)=>{const k=x[key]||'UNKNOWN';a[k]=(a[k]||0)+1;return a;},{});} 

async function load(){
  const res=await fetch(URL);
  const txt=await res.text();
  const parsed=Papa.parse(txt,{header:true}).data;

  data=parsed.map(r=>({
    tgl:(r['TGL']||'').trim(),
    shift:(r['SHIFT']||'').trim(),
    picker:(r['NAMA PICKER']||'').trim(),
    checker:(r['USER CHECKER']||'').trim(),
    area:(r['AREA']||'').trim(),
    temuan:(r['TEMUAN PENYIMPANGAN']||'').trim(),
    sku:(r['SKU']||'').trim()
  })).filter(x=>x.temuan);

  render();
}

function render(){
  const g=groupBy(data,'temuan');
  document.getElementById('kpi').innerHTML=Object.entries(g).map(([k,v])=>`<div class='kpi'><div>${k}</div><h2>${v}</h2></div>`).join('');

  makeChart('donut','doughnut',groupBy(data,'temuan'));
  makeChart('trend','line',groupBy(data,'tgl'));
  makeChart('picker','bar',groupBy(data,'picker'));
  makeChart('checker','bar',groupBy(data,'checker'));
  makeChart('sku','bar',groupBy(data,'sku'));
  makeChart('area','bar',groupBy(data,'area'));
}

function makeChart(id,type,obj){
  if(charts[id]) charts[id].destroy();
  charts[id]=new Chart(document.getElementById(id),{
    type:type,
    data:{labels:Object.keys(obj),datasets:[{data:Object.values(obj)}]}
  });
}

load();
</script>

</body>
</html>
